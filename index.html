<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>
<style>
    body {
        background-color: #000;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #0ff;
        margin: 0;
    }
    .container {
        background: #111;
        padding: 40px;
        border-radius: 20px;
        width: 400px;
        box-shadow: 0 0 20px #0ff;
        text-align: center;
    }
    h1 {
        margin-bottom: 30px;
        text-shadow: 0 0 10px #0ff;
    }
    form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    label {
        text-align: left;
        font-weight: bold;
        font-size: 0.9em;
    }
    input, select, button {
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 16px;
        transition: 0.3s;
    }
    input, select {
        background: #222;
        color: #fff;
    }
    input:focus, select:focus {
        box-shadow: 0 0 10px #0ff;
        background: #333;
    }
    button {
        background: #0ff;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 10px #0ff;
    }
    button:hover {
        background: #00b8b8;
        color: #fff;
        box-shadow: 0 0 20px #0ff;
    }
    #msg {
        margin-top: 15px;
        font-weight: bold;
        text-shadow: 0 0 5px #0ff;
    }
</style>
</head>
<body>
<div class="container">
    <h1>Book Your Appointment</h1>
    <div id="confirmationList"></div>
    <form id="bookingForm">
        <label for="name">Full Name:</label>
        <input type="text" id="name" placeholder="Your Name" required>

        <label for="age">Age:</label>
        <input type="number" id="age" placeholder="Your Age" required>

        <label for="department">Department:</label>
        <select id="department" required>
            <option value="">Select</option>
            <option value="General">General</option>
            <option value="Pediatrics">Pediatrics</option>
            <option value="Dentistry">Dentistry</option>
        </select>

        <label for="date">Appointment Date:</label>
        <input type="date" id="date" required>

        <button type="submit">Book Appointment</button>
    </form>
    <p id="msg"></p>
</div>

<script>
const form = document.getElementById("receptionist.html");

form.addEventListener("submit", async function(e){
    e.preventDefault(); // Prevent page reload

    const booking = {
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        department: document.getElementById("department").value,
        date: document.getElementById("date").value,
        status: "Pending"
    };

    try {
        // Send booking to Node.js server
        const response = await fetch('http://192.168.8.38:3000/server.js', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(booking)
        });

        const result = await response.json();
        if(result.status === 'success') {
            // Redirect to receptionist page
            window.location.href = 'http://192.168.8.38:5500/receptionist.html';
        } else {
            alert("Error sending booking. Try again.");
        }
    } catch(err) {
        alert("Server not reachable. Make sure Node.js server is running.");
        console.error(err);
    }
});


</script>
</body>
</html
